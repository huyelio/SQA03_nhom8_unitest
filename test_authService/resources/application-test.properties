# Cấu hình H2 in-memory dùng cho @DataJpaTest (CheckDB integration tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT config dùng trong test
jwt.secret=dGVzdFNlY3JldEtleUZvclVuaXRUZXN0aW5nSG1hY1NoYTI1Ng==
jwt.accessExpirationMs=3600000
jwt.refreshExpirationMs=86400000

# OTP config
otp.registerTtlSeconds=300
otp.resetTtlSeconds=300
otp.maxAttempts=5

# Tắt mail thật trong test
spring.mail.host=localhost
spring.mail.port=25
